name: Supabase Keep Alive (Anti-Pause)

on:
  schedule:
    # Runs at 00:00 UTC every 3 days to keep the project active
    - cron: '0 0 */3 * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API to Prevent Inactivity Pause
        run: |
          curl -v -X GET "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/rooms?select=id&limit=1" \
          -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}"
          echo "Ping successful. Database activity detected."
